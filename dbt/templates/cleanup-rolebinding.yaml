{{- if .Values.cleanup.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cleanup-rolebinding
  namespace: {{ include "dbt.namespace" . }}
  labels:
    {{- include "dbt.labels" . | nindent 4 }}
    app.kubernetes.io/component: pod-cleanup
subjects:
  - kind: ServiceAccount
    name: cleanup-sa
    namespace: {{ include "dbt.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cleanup-role
{{- end }}