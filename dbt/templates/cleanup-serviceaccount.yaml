{{- if and .Values.cleanup.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cleanup-sa
  namespace: {{ include "dbt.namespace" . }}
  labels:
    {{- include "dbt.labels" . | nindent 4 }}
    app.kubernetes.io/component: pod-cleanup
  {{- with .Values.cleanup.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}