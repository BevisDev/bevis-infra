{{- if and .Values.rbac.create .Values.rbac.subjects }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "dbt.fullname" . }}-rolebinding
  namespace: {{ include "dbt.namespace" . }}
  labels:
    {{- include "dbt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "dbt.fullname" . }}-role
subjects:
  {{- toYaml .Values.rbac.subjects | nindent 2 }}
{{- end }}
