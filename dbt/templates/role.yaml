{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "dbt.fullname" . }}-role
  namespace: {{ include "dbt.namespace" . }}
  labels:
    {{- include "dbt.labels" . | nindent 4 }}
rules:
  # Allow Airflow scheduler to create and manage dbt task pods in the namespace.
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - create
      - get
      - list
      - watch
      - patch
      - delete
  - apiGroups: [""]
    resources:
      - pods/log
    verbs:
      - get
  - apiGroups: [""]
    resources:
      - events
    verbs:
      - list
      - watch
  # Allow Airflow scheduler to read ConfigMaps and Secrets for mounting dbt profiles and credentials in pod specs.
  - apiGroups: [""]
    resources:
      - configmaps
      - secrets
    verbs:
      - get
  # Allow assigning the dbt workload ServiceAccount on launched pods
  - apiGroups: [""]
    resources:
      - serviceaccounts
    verbs:
      - get
{{- end }}
