apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: brokers
  labels: 
    {{- include "kafka.labels" . | nindent 4 }}
  {{- with $cfg.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ required (printf "%s.replicas is required" $name) $cfg.replicas }}
  roles:
    - broker
  storage:
    type: {{ $cfg.storage.type }}
    {{- if eq $cfg.storage.type "persistent-claim" }}
    size: {{ required (printf "%s.storage.size is required" $name) $cfg.storage.size }}
    deleteClaim: {{ $cfg.storage.deleteClaim | default false }}
    {{- with $cfg.storage.class }}
    class: {{ . }}
    {{- end }}
    {{- with $cfg.storage.id }}
    id: {{ . }}
    {{- end }}
    {{- end }}
  {{- with $cfg.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $cfg.jvmOptions }}
  jvmOptions:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- $tpl := deepCopy ($cfg.template | default dict) }}
  {{- if not (dig "pod" "affinity" nil $tpl) }}
  {{- $cluster := include "kafka.clusterName" $root }}
  {{- $antiAffinity := dict "requiredDuringSchedulingIgnoredDuringExecution" (list (dict "labelSelector" (dict "matchLabels" (dict "strimzi.io/cluster" $cluster "strimzi.io/pool-name" $name)) "topologyKey" "kubernetes.io/hostname")) }}
  {{- $pod := merge (dig "pod" dict $tpl) (dict "affinity" (dict "podAntiAffinity" $antiAffinity)) }}
  {{- $_ := set $tpl "pod" $pod }}
  {{- end }}
  {{- if $root.Values.imagePullSecrets }}
  {{- $pod := merge (dig "pod" dict $tpl) (dict "imagePullSecrets" $root.Values.imagePullSecrets) }}
  {{- $_ := set $tpl "pod" $pod }}
  {{- end }}
  template:
    {{- toYaml $tpl | nindent 4 }}
{{- end }}
