apiVersion: apps/v1
kind: Deployment
metadata:
  name: apicurio-registry-operator-v3.3.0
  namespace: {{ .Release.Namespace }}
  labels:
    app: apicurio-registry-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/instance: apicurio-registry-operator
    app.kubernetes.io/name: apicurio-registry-operator
    app.kubernetes.io/part-of: apicurio-registry
    app.kubernetes.io/version: 3.3.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apicurio-registry-operator
      app.kubernetes.io/component: operator
      app.kubernetes.io/instance: apicurio-registry-operator
      app.kubernetes.io/name: apicurio-registry-operator
      app.kubernetes.io/part-of: apicurio-registry
      app.kubernetes.io/version: 3.3.0
  template:
    metadata:
      labels:
        app: apicurio-registry-operator
        app.kubernetes.io/component: operator
        app.kubernetes.io/instance: apicurio-registry-operator
        app.kubernetes.io/name: apicurio-registry-operator
        app.kubernetes.io/part-of: apicurio-registry
        app.kubernetes.io/version: 3.3.0
    spec:
      containers:
      - env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: APICURIO_OPERATOR_WATCHED_NAMESPACES
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['olm.targetNamespaces']
        - name: QUARKUS_PROFILE
          value: prod
        - name: REGISTRY_APP_IMAGE
          value: quay.io/apicurio/apicurio-registry:3.3.0
        - name: REGISTRY_UI_IMAGE
          value: quay.io/apicurio/apicurio-registry-ui:3.3.0
        - name: REGISTRY_GITOPS_SYNC_IMAGE
          value: quay.io/apicurio/apicurio-registry-gitops-sync:3.3.0
        image: quay.io/apicurio/apicurio-registry-3-operator:3.3.0
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /q/health/live
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
        name: apicurio-registry-operator
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /q/health/ready
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 200m
            memory: 500Mi
          requests:
            cpu: 100m
            memory: 100Mi
        startupProbe:
          failureThreshold: 14
          httpGet:
            path: /q/health/started
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
      serviceAccountName: apicurio-registry-operator
